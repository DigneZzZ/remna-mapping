# Pull the prebuilt image from GitHub Container Registry (no local build).
#   docker compose -f docker-compose.ghcr.yml up -d
# If your GitHub user/org is not "dignezzz", change the image owner below.
services:
  remna-mapping:
    image: ghcr.io/dignezzz/remna-mapping:latest
    container_name: remna-mapping
    ports:
      # Local-only by default: reachable only from this host (127.0.0.1).
      # To expose, drop the 127.0.0.1 prefix — behind your own auth/VPN/proxy.
      - "127.0.0.1:8088:8088"
    environment:
      - HOST=0.0.0.0           # bind inside the container (host access gated by the ports mapping above)
      - PORT=8088
      - DOH=1                  # DNS-over-HTTPS fallback; set 0 for system DNS only
      - DNS_TIMEOUT_MS=4000
    restart: unless-stopped
    pull_policy: always        # always fetch the newest :latest on `up`