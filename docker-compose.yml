services:
  vpn-topology-mapper:
    build: .
    container_name: vpn-topology-mapper
    ports:
      # Local-only by default: reachable only from this host (127.0.0.1).
      # To expose on the LAN/Internet, drop the 127.0.0.1 prefix — but put it
      # behind your own auth/VPN/reverse proxy first; it has no built-in auth.
      - "127.0.0.1:8088:8088"
    environment:
      - HOST=0.0.0.0         # bind inside the container (host access is gated by the ports mapping above)
      - PORT=8088
      - DOH=1                # DNS-over-HTTPS fallback (dns.google). Set 0 to use system DNS only (no third-party DNS).
      - DNS_TIMEOUT_MS=4000  # per-name DNS timeout before fallback
    restart: unless-stopped
